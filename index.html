<!DOCTYPE html>

<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --cream: #faf8f4;
      --paper: #f2ede5;
      --ink: #1a1714;
      --muted: #7a7168;
      --accent: #c0392b;
      --rule: #ddd8cf;
      --card: #ffffff;
    }
 
    html { scroll-behavior: smooth; }
 
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }
 
    /* ── Header ── */
    header {
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 2.5rem 4rem 2rem;
      display: flex;
      align-items: flex-end;
      gap: 2rem;
    }
 
    .header-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
 
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1.15;
      color: var(--ink);
      font-weight: 400;
    }
 
    header h1 em {
      font-style: italic;
      color: var(--muted);
    }
 
    .header-meta {
      margin-left: auto;
      text-align: right;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.7;
    }
 
    /* ── Main layout ── */
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
      display: flex;
      flex-direction: column;
      gap: 5rem;
    }
 
    /* ── Section ── */
    .video-section {
      opacity: 0;
      transform: translateY(28px);
      animation: fadeUp 0.6s ease forwards;
    }
    .video-section:nth-child(1) { animation-delay: 0.1s; }
    .video-section:nth-child(2) { animation-delay: 0.25s; }
    .video-section:nth-child(3) { animation-delay: 0.4s; }
 
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
 
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      margin-bottom: 1.25rem;
    }
 
    .section-number {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
    }
 
    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.1rem, 2vw, 1.45rem);
      font-weight: 400;
      color: var(--ink);
    }
 
    .divider {
      flex: 1;
      height: 1px;
      background: var(--rule);
      position: relative;
      top: -3px;
    }
 
    /* ── Video card ── */
    .video-card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(26,23,20,0.06);
      transition: box-shadow 0.3s ease;
    }
    .video-card:hover {
      box-shadow: 0 6px 28px rgba(26,23,20,0.11);
    }
 
    .video-card video {
      display: block;
      width: 100%;
      max-height: 520px;
      object-fit: contain;
      background: #111;
    }
 
 
 
    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 2rem 1.5rem 1.5rem; flex-wrap: wrap; }
      .header-meta { margin-left: 0; text-align: left; }
      .qr-row { flex-direction: column; }
      .qr-panel { width: 100%; flex-direction: row; gap: 1.5rem; }
    }
  </style>
</head>
